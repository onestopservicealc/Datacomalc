<head>

<title>ทะเบียนครุภัณฑ์คอมพิวเตอร์ สคอ.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F8; --surface:#FFFFFF; --ink:#182130; --ink-2:#5B6472; --ink-3:#8A93A2;
    --line:#E4E7EC; --line-2:#D3D8E0; --accent:#2F5FE0; --accent-soft:#EAF0FF;
    --danger:#D8453A; --danger-soft:#FDECEA; --warn:#B5730B; --warn-soft:#FBF0DC;
    --ok:#0E7C57; --ok-soft:#E6F4EE; --radius:10px;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 64px}

  header.top{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .top-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{width:38px;height:38px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
  .title h1{margin:0;font-size:16px;font-weight:600;letter-spacing:-.01em}
  .title p{margin:1px 0 0;font-size:12px;color:var(--ink-3)}
  .top-spacer{flex:1}
  .sync{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);padding:6px 11px;border-radius:99px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}

  nav.tabs{display:flex;gap:2px;max-width:1180px;margin:0 auto;padding:0 12px;overflow-x:auto}
  nav.tabs button{appearance:none;border:0;background:none;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink-2);padding:13px 15px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
  nav.tabs button .cnt{font-size:11px;background:var(--bg);color:var(--ink-3);border-radius:99px;padding:1px 7px;font-family:var(--mono)}
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
  nav.tabs button.active .cnt{background:var(--accent-soft);color:var(--accent)}

  .panel{padding-top:22px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;height:38px;border:1px solid var(--line-2);border-radius:9px;padding:0 12px 0 34px;font-family:inherit;font-size:13.5px;background:var(--surface);color:var(--ink)}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  select.filter{height:38px;border:1px solid var(--line-2);border-radius:9px;padding:0 30px 0 12px;font-family:inherit;font-size:13.5px;background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235B6472' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>") no-repeat right 9px center;color:var(--ink);cursor:pointer;-webkit-appearance:none;appearance:none;max-width:230px}
  select.filter:focus{outline:none;border-color:var(--accent)}
  .btn{height:38px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:9px;padding:0 14px;font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .btn:hover{background:var(--bg);border-color:var(--ink-3)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#254dbd}
  .btn.ghost{border-color:transparent;color:var(--ink-2)}
  .btn.ghost:hover{background:var(--bg)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-weight:600;color:var(--ink-2);font-size:11.5px;letter-spacing:.02em;padding:11px 14px;background:#FafbFC;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--accent-soft)}
  td.mono,th.mono{font-family:var(--mono);font-size:12px;color:var(--ink)}
  .rowact{display:flex;gap:4px;justify-content:flex-end;opacity:0;transition:opacity .1s}
  tbody tr:hover .rowact{opacity:1}
  .iconbtn{width:30px;height:30px;border:1px solid var(--line);background:var(--surface);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2)}
  .iconbtn:hover{background:var(--bg);color:var(--ink)}
  .iconbtn.del:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-soft)}
  .empty{padding:44px 20px;text-align:center;color:var(--ink-3)}
  .empty i{font-size:26px;display:block;margin-bottom:8px;opacity:.6}
  .muted{color:var(--ink-3)}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:2px 9px;border-radius:99px;white-space:nowrap}
  .badge.win10{background:var(--warn-soft);color:var(--warn)}
  .badge.win11{background:var(--ok-soft);color:var(--ok)}
  .badge.na{background:var(--bg);color:var(--ink-3)}
  .badge.store{background:var(--bg);color:var(--ink-2)}
  .count-note{font-size:12px;color:var(--ink-3);margin:12px 2px 0}

  /* dashboard */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .stat .k{font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:7px}
  .stat .v{font-size:30px;font-weight:600;margin-top:6px;letter-spacing:-.02em}
  .stat .v small{font-size:13px;font-weight:400;color:var(--ink-3)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}
  .block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .block h3{margin:0 0 14px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
  .bar-row .lab{width:150px;flex-shrink:0;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:9px;background:var(--bg);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;background:var(--accent)}
  .bar-row .num{width:30px;text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--ink-2)}
  .alert{display:flex;gap:12px;background:var(--warn-soft);border:1px solid #F0DDB4;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
  .alert i{color:var(--warn);font-size:19px;flex-shrink:0;margin-top:1px}
  .alert b{color:#7A4E06}
  .alert p{margin:3px 0 0;font-size:12.5px;color:#7A4E06}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(24,33,48,.42);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 50px rgba(24,33,48,.22)}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);border-radius:14px 14px 0 0}
  .modal-h h2{margin:0;font-size:15.5px;font-weight:600}
  .modal-b{padding:8px 22px 4px}
  .fsec{margin:16px 0 4px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--line);padding-bottom:6px}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;margin-top:12px}
  @media(max-width:560px){.fgrid{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12px;color:var(--ink-2);font-weight:500}
  .field input,.field select{height:37px;border:1px solid var(--line-2);border-radius:8px;padding:0 11px;font-family:inherit;font-size:13.5px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field .mono-in{font-family:var(--mono);font-size:12.5px}
  .modal-f{display:flex;gap:10px;justify-content:space-between;align-items:center;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--surface);border-radius:0 0 14px 14px}
  .modal-f .right{display:flex;gap:10px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:13px;z-index:60;opacity:0;transition:.2s;display:flex;align-items:center;gap:8px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{padding:60px;text-align:center;color:var(--ink-3)}
  .spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>

/* ============ STORAGE ============ */
const keyFor = t => t + "_records_v1";
async function loadType(t){
  const k = keyFor(t);
  try{
    const r = await window.storage.get(k, true);
    if(r && r.value) return JSON.parse(r.value);
  }catch(e){/* not found -> seed below */}
  const seeded = (SEED[t]||[]).map((rec,i)=>({_id:`${t}_seed_${i}`, ...rec}));
  try{ await window.storage.set(k, JSON.stringify(seeded), true); }catch(e){ console.error(e); }
  return seeded;
}
async function persist(t){
  try{ await window.storage.set(keyFor(t), JSON.stringify(DB[t]), true); }
  catch(e){ toast("บันทึกไม่สำเร็จ ลองอีกครั้ง", true); console.error(e); }
}

/* ============ HELPERS ============ */
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function uid(t){ return `${t}_${Date.now()}_${Math.floor(Math.random()*1000)}`; }
function distinct(t, key){
  const s = new Set();
  (DB[t]||[]).forEach(r=>{ const v=(r[key]||"").trim(); if(v && v!=="-") s.add(v); });
  return [...s].sort((a,b)=>a.localeCompare(b,'th'));
}
function osBadge(v){
  const s=(v||"").trim();
  if(!s||s==="-") return '<span class="badge na">ไม่ระบุ</span>';
  if(s.startsWith("11")) return `<span class="badge win11"><i class="ti ti-check"></i>Win ${esc(s)}</span>`;
  if(s.startsWith("10")) return `<span class="badge win10"><i class="ti ti-alert-triangle"></i>Win ${esc(s)}</span>`;
  return `<span class="badge na">${esc(s)}</span>`;
}
function groupCell(v){
  const s=(v||"").trim();
  if(s.startsWith("!!!")) return `<span class="badge store">${esc(s.replace(/!/g,"").trim())}</span>`;
  return esc(s)||'<span class="muted">—</span>';
}

/* ============ TABS ============ */
function renderTabs(){
  const t = document.getElementById("tabs");
  let h = `<button class="${current==='dashboard'?'active':''}" onclick="go('dashboard')"><i class="ti ti-layout-dashboard"></i> ภาพรวม</button>`;
  TYPES.forEach(k=>{
    h += `<button class="${current===k?'active':''}" onclick="go('${k}')"><i class="ti ${SCHEMA[k].icon}"></i> ${SCHEMA[k].label} <span class="cnt">${(DB[k]||[]).length}</span></button>`;
  });
  t.innerHTML = h;
}
function go(t){ current=t; searchTerm=""; filterVal=""; render(); renderTabs(); window.scrollTo({top:0}); }

/* ============ RENDER ============ */
function render(){
  const v = document.getElementById("view");
  if(current==="dashboard"){ v.innerHTML = dashboardHTML(); return; }
  v.innerHTML = listHTML(current);
}

function listHTML(t){
  const sc = SCHEMA[t];
  const gf = sc.groupField;
  const opts = distinct(t, gf);
  let rows = DB[t].slice();
  if(filterVal) rows = rows.filter(r=>(r[gf]||"")===filterVal);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    rows = rows.filter(r=>Object.values(r).some(x=>String(x||"").toLowerCase().includes(q)));
  }
  const filterLabel = gf==="building" ? "ทุกอาคาร" : "ทุกกลุ่มงาน";
  let h = `
  <div class="panel">
    <div class="toolbar">
      <div class="search"><i class="ti ti-search ic"></i><input id="searchbox" placeholder="ค้นหา ${esc(sc.singular)}… (ชื่อ, เลขครุภัณฑ์, IP, รุ่น ฯลฯ)" value="${esc(searchTerm)}"></div>
      <select class="filter" id="filterbox">
        <option value="">${filterLabel}</option>
        ${opts.map(o=>`<option value="${esc(o)}" ${o===filterVal?'selected':''}>${esc(o.replace(/!/g,'').trim())}</option>`).join("")}
      </select>
      <button class="btn" onclick="exportCSV('${t}')"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn primary" onclick="openAdd('${t}')"><i class="ti ti-plus"></i> เพิ่ม${esc(sc.singular)}</button>
    </div>
    <div class="card"><div class="tablewrap"><table>
      <thead><tr>${sc.tableCols.map(c=>`<th class="${MONO_KEYS.has(c[0])?'mono':''}">${esc(c[1])}</th>`).join("")}<th></th></tr></thead>
      <tbody>`;
  if(rows.length===0){
    h += `<tr><td colspan="${sc.tableCols.length+1}"><div class="empty"><i class="ti ti-inbox"></i>${searchTerm||filterVal?'ไม่พบรายการที่ตรงกับเงื่อนไข':'ยังไม่มีรายการ กด “เพิ่ม” เพื่อเริ่มบันทึก'}</div></td></tr>`;
  } else {
    rows.forEach(r=>{
      h += `<tr onclick="openEdit('${t}','${r._id}')">`;
      sc.tableCols.forEach(c=>{
        const key=c[0], val=r[key];
        let cell;
        if(key==="os") cell=osBadge(val);
        else if(key==="group") cell=groupCell(val);
        else cell = (val&&String(val).trim()&&val!=="-")?esc(val):'<span class="muted">—</span>';
        h += `<td class="${MONO_KEYS.has(key)?'mono':''}">${cell}</td>`;
      });
      h += `<td><div class="rowact">
        <div class="iconbtn" onclick="event.stopPropagation();openEdit('${t}','${r._id}')" title="แก้ไข"><i class="ti ti-edit"></i></div>
        <div class="iconbtn del" onclick="event.stopPropagation();quickDelete('${t}','${r._id}')" title="ลบ"><i class="ti ti-trash"></i></div>
      </div></td></tr>`;
    });
  }
  h += `</tbody></table></div></div>
    <p class="count-note">แสดง ${rows.length} จาก ${DB[t].length} รายการ</p>
  </div>`;
  return h;
}

  h += `</div>`;

  h += `<div class="grid2">
    <div class="block"><h3><i class="ti ti-users-group"></i> คอมพิวเตอร์แยกตามกลุ่มงาน</h3>`;
  GROUPS.forEach(g=>{
    h += `<div class="bar-row"><span class="lab" title="${esc(g)}">${esc(g)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(gcount[g]/gmax*100)}%"></div></div><span class="num">${gcount[g]}</span></div>`;
  });
  h += `</div>
    <div class="block"><h3><i class="ti ti-tag"></i> ยี่ห้อคอมพิวเตอร์</h3>`;
  bsorted.forEach(([b,n])=>{
    h += `<div class="bar-row"><span class="lab" title="${esc(b)}">${esc(b)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/bmax*100)}%;background:#0E7C57"></div></div><span class="num">${n}</span></div>`;
  });
  h += `</div></div>`;

  // network info
  if((SEED.network||[]).length){
    h += `<div class="block" style="margin-top:12px"><h3><i class="ti ti-network"></i> ค่าเครือข่าย (IP / Gateway / DNS)</h3>`;
    h += SEED.network.map(l=>`<div style="font-family:var(--mono);font-size:12px;color:var(--ink-2);padding:3px 0">${esc(l)}</div>`).join("");
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

/* ============ MODAL ============ */
function fieldHTML(f, val){
  const [key,label,type,span] = [f[0],f[1],f[2]||"text",f[3]];
  const full = span==="full" ? " full":"";
  const mono = MONO_KEYS.has(key) ? " mono-in":"";
  let ctrl;
  if(type && type.startsWith("select:")){
    const opts = type.slice(7).split(",");
    ctrl = `<select id="f_${key}"><option value=""></option>${opts.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join("")}</select>`;
  } else if(type && type.startsWith("datalist:")){
    const src = type.slice(9);
    let list = [];
    if(src==="group") list = GROUPS;
    else if(src==="os") list = OS_OPTS;
    else if(src==="prefix") list = ["นาย","นาง","นางสาว","-"];
    else list = distinct(current, key);
    ctrl = `<input id="f_${key}" class="${mono}" list="dl_${key}" value="${esc(val)}"><datalist id="dl_${key}">${list.map(o=>`<option value="${esc(o)}">`).join("")}</datalist>`;
  } else {
    ctrl = `<input id="f_${key}" class="${mono}" value="${esc(val)}">`;
  }
  return `<div class="field${full}"><label for="f_${key}">${esc(label)}</label>${ctrl}</div>`;
}
function buildForm(t, rec){
  const sc = SCHEMA[t];
  let h = "";
  sc.sections.forEach(([title,fields])=>{
    h += `<div class="fsec">${esc(title)}</div><div class="fgrid">`;
    fields.forEach(f=> h += fieldHTML(f, rec[f[0]]||""));
    h += `</div>`;
  });
  return h;
}
function openAdd(t){
  editing = null; current = t;
  document.getElementById("mTitle").textContent = "เพิ่ม" + SCHEMA[t].singular;
  document.getElementById("mBody").innerHTML = buildForm(t, {});
  document.getElementById("mDelete").style.display = "none";
  openOverlay();
}
function openEdit(t, id){
  current = t;
  editing = DB[t].find(r=>r._id===id);
  if(!editing) return;
  document.getElementById("mTitle").textContent = "แก้ไข" + SCHEMA[t].singular;
  document.getElementById("mBody").innerHTML = buildForm(t, editing);
  document.getElementById("mDelete").style.display = "inline-flex";
  openOverlay();
}
function collectForm(t){
  const rec = {};
  SCHEMA[t].sections.forEach(([_,fields])=>fields.forEach(f=>{
    const el = document.getElementById("f_"+f[0]);
    if(el) rec[f[0]] = el.value.trim();
  }));
  return rec;
}
async function saveModal(){
  const t = current;
  const data = collectForm(t);
  if(editing){
    Object.assign(editing, data);
    toast("บันทึกการแก้ไขแล้ว");
  } else {
    DB[t].unshift({_id:uid(t), ...data});
    toast("เพิ่มรายการแล้ว");
  }
  await persist(t);
  closeModal(); render(); renderTabs();
}
async function deleteCurrent(){
  if(!editing) return;
  if(!confirm("ต้องการลบรายการนี้ใช่หรือไม่? การลบไม่สามารถกู้คืนได้")) return;
  DB[current] = DB[current].filter(r=>r._id!==editing._id);
  await persist(current);
  toast("ลบรายการแล้ว");
  closeModal(); render(); renderTabs();
}
async function quickDelete(t, id){
  if(!confirm("ต้องการลบรายการนี้ใช่หรือไม่? การลบไม่สามารถกู้คืนได้")) return;
  DB[t] = DB[t].filter(r=>r._id!==id);
  await persist(t);
  toast("ลบรายการแล้ว");
  render(); renderTabs();
}
function openOverlay(){ document.getElementById("overlay").classList.add("open"); }
function closeModal(){ document.getElementById("overlay").classList.remove("open"); editing=null; }

/* ============ EXPORT ============ */
function exportCSV(t){
  const sc = SCHEMA[t];
  const keys = sc.sections.flatMap(([_,fs])=>fs.map(f=>f[0]));
  const labels = sc.sections.flatMap(([_,fs])=>fs.map(f=>f[1]));
  const rows = DB[t];
  const q = s => '"'+String(s==null?"":s).replace(/"/g,'""')+'"';
  let csv = "\uFEFF" + labels.map(q).join(",") + "\n";
  rows.forEach(r=> csv += keys.map(k=>q(r[k])).join(",") + "\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${t}_export.csv`;
  a.click();
  toast("ดาวน์โหลด CSV แล้ว");
}

/* ============ TOAST ============ */
let toastTimer;
function toast(msg, danger){
  const el = document.getElementById("toast");
  el.innerHTML = `<i class="ti ti-${danger?'alert-circle':'check'}"></i> ${esc(msg)}`;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2200);
}

/* ============ EVENTS ============ */
document.addEventListener("input", e=>{
  if(e.target.id==="searchbox"){ searchTerm=e.target.value; const v=document.getElementById("view"); v.innerHTML=listHTML(current); document.getElementById("searchbox").focus(); const el=document.getElementById("searchbox"); el.setSelectionRange(el.value.length,el.value.length); }
});
document.addEventListener("change", e=>{
  if(e.target.id==="filterbox"){ filterVal=e.target.value; document.getElementById("view").innerHTML=listHTML(current); }
});
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

/* ============ INIT ============ */
(async function init(){
  try{
    for(const t of TYPES){ DB[t] = await loadType(t); }
    renderTabs(); render();
  }catch(e){
    document.getElementById("view").innerHTML = `<div class="empty" style="padding:60px"><i class="ti ti-alert-circle"></i>โหลดข้อมูลไม่สำเร็จ — ลองรีเฟรชหน้าอีกครั้ง</div>`;
    console.error(e);
  }
})();
</script>
